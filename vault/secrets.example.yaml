# =============================================================================
# LinkinClaw Vault — Your Private Credentials
# =============================================================================
# Copy this file to secrets.yaml and fill in your real values:
#   cp secrets.example.yaml secrets.yaml
#
# ⚠️ secrets.yaml is gitignored. Never commit it.
# =============================================================================

# LinkedIn Login
# Choose ONE method: credentials, google_oauth, or apple_oauth
linkedin:
  login_method: "credentials"  # "credentials" | "google_oauth" | "apple_oauth"

  # Option 1: Email + Password
  email: ""
  password: ""

  # Option 2: Google OAuth (bot will click "Sign in with Google")
  google_oauth:
    email: ""
    password: ""

  # Option 3: Apple OAuth (bot will click "Sign in with Apple")
  apple_oauth:
    email: ""
    password: ""

# Your profile info (used to fill application forms)
user_profile:
  name: "Your Full Name"
  email: "your-email@example.com"
  phone: "+1(555)123-4567"
  linkedin_url: ""
  website: ""
  sponsorship_answer: "No"

# Job Portal Account Creation
# When applying on external company career sites, the bot uses these credentials.
# Your email stays the same everywhere. Only the password can optionally vary.
#
# Password pattern — use {company} as placeholder for per-company passwords,
# or just set a fixed password to use everywhere.
#   Examples:
#     "MyP@ss_{company}_2026"  → MyP@ss_stripe_2026
#     "FixedSecurePassword1!"  → same password for everything
#
portal_accounts:
  email: ""  # Same email used for all portals
  password_pattern: ""  # Fixed or {company}-templated password
  prefer_linkedin_apply: true  # Use "Apply with LinkedIn" when available
