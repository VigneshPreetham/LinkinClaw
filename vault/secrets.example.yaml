# =============================================================================
# LinkinClaw Vault — Your Private Credentials
# =============================================================================
# Copy this file to secrets.yaml and fill in your real values:
#   cp secrets.example.yaml secrets.yaml
#
# ⚠️ secrets.yaml is gitignored. Never commit it.
# =============================================================================

# LinkedIn Login
# Choose ONE method: credentials, google_oauth, or apple_oauth
linkedin:
  login_method: "credentials"  # "credentials" | "google_oauth" | "apple_oauth"

  # Option 1: Email + Password
  email: ""
  password: ""

  # Option 2: Google OAuth (bot will click "Sign in with Google")
  google_oauth:
    email: ""
    password: ""

  # Option 3: Apple OAuth (bot will click "Sign in with Apple")
  apple_oauth:
    email: ""
    password: ""

# Your profile info (used to fill application forms)
user_profile:
  name: "Your Full Name"
  email: "your-email@example.com"
  phone: "+1(555)123-4567"
  linkedin_url: ""
  website: ""
  sponsorship_answer: "No"

# Job Portal Account Creation Pattern
# When applying to external company portals (not Easy Apply), the bot
# may need to create accounts on career sites. Define your patterns here.
#
# Email pattern — use {company} as placeholder for the company name
#   Examples:
#     "john.doe+{company}@gmail.com"  → john.doe+stripe@gmail.com
#     "john.doe.{company}@gmail.com"  → john.doe.stripe@gmail.com
#     "johndoe@gmail.com"             → same email for everything
#
# Password pattern — use {company} as placeholder, or set a fixed password
#   Examples:
#     "MyP@ss_{company}_2026"  → MyP@ss_stripe_2026
#     "FixedSecurePassword1!"  → same password for everything
#
portal_accounts:
  email_pattern: ""
  password_pattern: ""
  # If you prefer the bot to use your LinkedIn "Apply with LinkedIn" where available:
  prefer_linkedin_apply: true
